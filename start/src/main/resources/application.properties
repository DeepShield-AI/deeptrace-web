spring.application.name=deeptrace-web
server.port=8081

# Mysql Configuration PRD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.url=jdbc:mysql://10.0.9.10:3306/traffic_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.url=jdbc:mysql://114.215.254.187:3306/deep_trace?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=deeptrace
spring.datasource.password=DeepTrace!1

mybatis.mapper-locations=classpath:mapper/*.xml



# GreptimeDB (MySQL-protocol) datasource
greptime.datasource.driver-class-name = com.mysql.cj.jdbc.Driver
greptime.datasource.url=jdbc:mysql://114.215.254.187:4002/public?connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true
greptime.datasource.username=
greptime.datasource.password=

mybatis.greptime.mapper-locations=classpath:mapper/greptime/*.xml


#JWT
jwt.tokenHeader: Authorization
jwt.secret: deeptrace-server-for-generate-token
#J(60*60*24*7=604800)
jwt.expiration: 3600
jwt.tokenHead: Bearer
secure.ignored.urls=/api/user/register,\
  /api/user/login

# MinIO Configuration for Distributed File Storage
minio.endpoint=http://114.215.254.187:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=deeptrace-files
minio.secure=false
minio.default-url-expiration-seconds=3600
minio.max-file-size=104857600
minio.region=

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB